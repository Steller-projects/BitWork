name: "\u2728 Feature Request"
description: Suggest a new feature or improvement for BitWork.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please fill in as much detail as you can.

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Is there an existing issue or discussion for this?
      description: Please search [open issues](../issues) and [discussions](../discussions) first.
      options:
        - label: I have searched existing issues and discussions – this has not been requested before.
          required: true

  - type: dropdown
    id: component
    attributes:
      label: Target Component
      description: Which part of the project should this feature be added to?
      options:
        - "Smart Contracts – Escrow (bitwork_escrow.rs)"
        - "Smart Contracts – Reputation / Identity (bitwork_id.rs)"
        - "Smart Contracts – Factory"
        - "Frontend – Wallet Integration"
        - "Frontend – UI / UX"
        - "SDK / Off-ramp Integration"
        - "CI / Tooling"
        - "Documentation"
        - "New Component"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Describe the problem this feature would solve. What pain point does it address?
      placeholder: "As a builder, I want to … so that …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you have in mind. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you have considered.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "🔴 Critical – blocks core functionality"
        - "🟠 High – significant improvement"
        - "🟡 Medium – nice-to-have"
        - "🟢 Low – minor improvement"

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request to implement this feature.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, diagrams, or references.
